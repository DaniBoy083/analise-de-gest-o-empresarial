[build]
  command = "python -m pip install --upgrade pip && python -m pip install -r requirements.txt && npx esbuild web_src/dashboard.ts --bundle --platform=browser --outfile=docs/site/dashboard.js --sourcemap --minify && python main.py --output-dir docs/site"
  publish = "docs/site"

[build.environment]
  PYTHON_VERSION = "3.12"
